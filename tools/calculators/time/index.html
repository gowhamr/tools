<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Calculator — KaruviLab</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <script>window.SHELL_ACTIVE = 'calculators';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">
      <div class="nav-head">
        <p class="nav-title">Time Calculator</p>
        <p class="nav-subtitle">Add or subtract time durations</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-section">
        <div class="preset-chips" id="time-toggle">
          <button class="preset-chip active" data-mode="add">Add</button>
          <button class="preset-chip" data-mode="sub">Subtract</button>
        </div>

        <div class="fmt-grid" style="margin-top:20px; grid-template-columns: 1fr 1fr;">
          <div class="time-block">
             <label class="tool-label" style="display:block; margin-bottom:10px;">Time 1</label>
             <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;">
               <input type="number" class="workspace-input" id="t1-h" value="2" min="0" placeholder="H">
               <input type="number" class="workspace-input" id="t1-m" value="30" min="0" placeholder="M">
               <input type="number" class="workspace-input" id="t1-s" value="0" min="0" placeholder="S">
             </div>
          </div>
          <div class="time-block">
             <label class="tool-label" style="display:block; margin-bottom:10px;">Time 2</label>
             <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px;">
               <input type="number" class="workspace-input" id="t2-h" value="1" min="0" placeholder="H">
               <input type="number" class="workspace-input" id="t2-m" value="45" min="0" placeholder="M">
               <input type="number" class="workspace-input" id="t2-s" value="0" min="0" placeholder="S">
             </div>
          </div>
        </div>

        <div class="fmt-actions">
          <button class="fmt-btn fmt-btn-primary" id="calc-btn">Calculate</button>
        </div>
        <div class="results-area" id="time-result" style="display:none; margin-top: 24px;"></div>
      </div>

      <div class="tool-section info-section">
        <h3>About the Time Calculator</h3>
        <p>Add or subtract two time durations expressed in hours, minutes, and seconds. Useful for timesheets, workout logs, and shift scheduling.</p>
      </div>
    </div>
  </div>

  <script src="../../../js/shell.js"></script>
  <script src="../../../js/theme.js"></script>
  <script src="../../../js/utils.js"></script>
  <script>
    (function() {
      const el = id => document.getElementById(id);
      const fmt = (n, d = 0) => n.toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d });
      const metric = (label, value, cls='') => `
        <div class="result-card" style="margin-bottom:12px">
          <div style="font-size:0.75rem; color:var(--text-3); text-transform:uppercase; font-weight:700;">${label}</div>
          <div style="font-size:1.5rem; font-weight:800; color:${cls==='accent'?'var(--blue)':'var(--text)'}">${value}</div>
        </div>`;

      let timeMode = 'add';
      const btns = document.querySelectorAll('#time-toggle button');
      btns.forEach(b => {
        b.onclick = () => {
          btns.forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          timeMode = b.dataset.mode;
        };
      });

      el('calc-btn').onclick = () => {
        const s1 = (+el('t1-h').value) * 3600 + (+el('t1-m').value) * 60 + (+el('t1-s').value);
        const s2 = (+el('t2-h').value) * 3600 + (+el('t2-m').value) * 60 + (+el('t2-s').value);
        let total = timeMode === 'add' ? s1 + s2 : s1 - s2;
        const neg = total < 0;
        total = Math.abs(total);
        const h = Math.floor(total / 3600);
        const m = Math.floor((total % 3600) / 60);
        const s = total % 60;
        
        const res = el('time-result');
        res.innerHTML = `
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px;">
            ${metric('Result', (neg ? '− ' : '') + `${h}h ${m}m ${s}s`, 'accent')}
            ${metric('In Minutes', fmt(total / 60, 2))}
            ${metric('In Seconds', fmt(total, 0))}
          </div>`;
        res.style.display = 'block';
      };
    })();
  </script>
</body>
</html>
