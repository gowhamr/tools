<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URL Encoder/Decoder — KaruviLab</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script>window.SHELL_ACTIVE = 'tools';</script>
</head>
<body class="app-shell">
  <noscript>
    <div style="padding: 20px; text-align: center; background: #fee2e2; color: #991b1b;">
      Please enable JavaScript to use KaruviLab tools.
    </div>
  </noscript>

  <div class="panel tool-panel active">
    <div class="panel-nav">
      <div class="nav-back" onclick="Shell.goHome()" role="button" tabindex="0" aria-label="Go home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">URL Encoder/Decoder</p>
        <p class="nav-subtitle">Encode or decode URLs and parameters</p>
      </div>
    </div>
    <div class="panel-scroll">
      <nav class="breadcrumb-nav">
        <a href="/">Home</a>
        <span class="breadcrumb-sep">/</span>
        <a href="/tools/">Tools</a>
        <span class="breadcrumb-sep">/</span>
        <span class="current">URL Encoder</span>
      </nav>

      <div class="tool-tabs">
        <button class="tool-tab active" id="tab-encode">Encode</button>
        <button class="tool-tab" id="tab-decode">Decode</button>
      </div>

      <div class="tool-section">
        <label class="tool-label">Input</label>
        <textarea class="tool-textarea" id="url-input" rows="8" placeholder="Enter text to encode or decode..." spellcheck="false"></textarea>
      </div>

      <div class="tool-output-wrap" id="output-wrap" hidden>
        <div class="tool-output-header">
          <span class="tool-output-label">Result</span>
          <button class="tool-copy-btn" id="copy-btn">Copy</button>
        </div>
        <textarea class="tool-textarea tool-output" id="url-output" rows="8" readonly spellcheck="false"></textarea>
      </div>

      <div class="settings-card">
        <p class="settings-card-title">Options</p>
        <div class="settings-row">
          <span class="settings-label">Live Preview</span>
          <label class="checkbox-label" style="padding-top:0"><input type="checkbox" id="live-mode" checked> Enabled</label>
        </div>
      </div>
      
      <p class="tool-error" id="error-msg" hidden></p>
      
      <button class="panel-cta-btn" id="run-btn" style="margin-top:20px">✓ Process</button>
    </div>
  </div>

  <script src="/js/shell.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/app.js"></script>

  <script>
    (function() {
      const input = document.getElementById('url-input');
      const output = document.getElementById('url-output');
      const outputWrap = document.getElementById('output-wrap');
      const runBtn = document.getElementById('run-btn');
      const copyBtn = document.getElementById('copy-btn');
      const errorMsg = document.getElementById('error-msg');
      const liveMode = document.getElementById('live-mode');
      const tabEncode = document.getElementById('tab-encode');
      const tabDecode = document.getElementById('tab-decode');

      let mode = 'encode';

      tabEncode.onclick = () => {
        mode = 'encode';
        tabEncode.classList.add('active');
        tabDecode.classList.remove('active');
        process();
      };

      tabDecode.onclick = () => {
        mode = 'decode';
        tabDecode.classList.add('active');
        tabEncode.classList.remove('active');
        process();
      };

      function process() {
        const val = input.value.trim();
        errorMsg.hidden = true;
        
        if (!val) {
          outputWrap.hidden = true;
          return;
        }

        try {
          let result = '';
          if (mode === 'encode') {
            result = encodeURIComponent(val);
          } else {
            result = decodeURIComponent(val);
          }
          output.value = result;
          outputWrap.hidden = false;
        } catch (e) {
          errorMsg.textContent = "Invalid input for " + mode;
          errorMsg.hidden = false;
          outputWrap.hidden = true;
        }
      }

      const debouncedProcess = Utils.debounce(process, 200);

      input.oninput = () => {
        if (liveMode.checked) debouncedProcess();
      };

      runBtn.onclick = process;

      copyBtn.onclick = () => {
        output.select();
        document.execCommand('copy');
        copyBtn.textContent = 'Copied!';
        copyBtn.classList.add('copied');
        Shell.toast('Result copied to clipboard', 'success');
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.classList.remove('copied');
        }, 2000);
      };
    })();
  </script>
</body>
</html>
