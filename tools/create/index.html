<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create / Resize Image — KaruviLab</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <script>window.SHELL_ACTIVE = 'create';</script>
</head>
<body>
  <div class="panel tool-panel active" id="panel-creator">
    <div class="panel-nav">
      <div class="nav-head">
        <p class="nav-title">Create / Resize</p>
        <p class="nav-subtitle">Passport photos &amp; custom sizes</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="panel-upload-group">
        <div class="preset-chips">
          <button class="preset-chip preset-btn" data-w="200" data-h="230" data-label="Passport Photo">
            <span class="preset-chip-name">Passport</span>
            <span class="preset-chip-desc">200×230</span>
          </button>
          <button class="preset-chip preset-btn" data-w="140" data-h="60" data-label="Signature">
            <span class="preset-chip-name">Signature</span>
            <span class="preset-chip-desc">140×60</span>
          </button>
          <button class="preset-chip preset-btn" data-w="200" data-h="200" data-label="Thumb Impression">
            <span class="preset-chip-name">Thumb</span>
            <span class="preset-chip-desc">200×200</span>
          </button>
          <button class="preset-chip preset-btn" data-w="1000" data-h="700" data-label="ID Proof">
            <span class="preset-chip-name">ID Proof</span>
            <span class="preset-chip-desc">1000×700</span>
          </button>
        </div>

        <div class="settings-card">
          <p class="settings-card-title">Dimensions &amp; Style</p>
          <div class="dim-quick-wrap settings-row">
            <input type="text" id="create-dim-quick" placeholder="e.g. 578x385 or 1920x1080" class="dim-quick-input" />
            <button class="dim-apply-btn" id="create-dim-apply">Apply</button>
          </div>
          <div class="dim-fields-row">
            <div class="dim-field">
              <span class="dim-field-label">Width</span>
              <div class="input-with-unit">
                <input type="number" id="create-width" value="200" min="1" max="10000" />
                <span class="unit">px</span>
              </div>
            </div>
            <label class="dim-lock-btn">
              <input type="checkbox" id="create-lock-ratio" checked />
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            </label>
            <div class="dim-field">
              <span class="dim-field-label">Height</span>
              <div class="input-with-unit">
                <input type="number" id="create-height" value="230" min="1" max="10000" />
                <span class="unit">px</span>
              </div>
            </div>
          </div>
          <div class="settings-row">
            <span class="settings-label">Background</span>
            <select id="create-bg">
              <option value="#ffffff">White</option>
              <option value="#f5f5f5">Light Gray</option>
              <option value="#fffde7">Light Yellow</option>
              <option value="#e8f5e9">Light Green</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">Output format</span>
            <select id="create-format">
              <option value="jpeg">JPG</option>
              <option value="png">PNG</option>
              <option value="gif">GIF</option>
              <option value="bmp">BMP</option>
              <option value="tiff">TIFF</option>
              <option value="webp">WebP</option>
              <option value="avif">AVIF</option>
            </select>
          </div>
        </div>

        <div class="upload-zone upload-zone-sm" id="creator-drop">
          <div class="upload-icon-wrap-sm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          <div class="upload-sm-text">
            <p class="upload-sm-title">Upload Image to Resize <span class="upload-sm-optional">(optional)</span></p>
            <p class="upload-or"><label for="creator-input">Tap to browse</label> or drag here</p>
          </div>
          <input type="file" id="creator-input" accept=".jpg,.jpeg,.jfif,.png,.gif,.webp,.avif,.tiff,.tif,.bmp,.heic,.heif" />
        </div>

        <div class="creator-preview-card" id="creator-preview-wrap">
          <canvas id="creator-canvas" style="display:none;max-width:100%;border-radius:8px"></canvas>
          <p class="preview-hint" id="creator-preview-hint">Preview will appear here</p>
        </div>

        <div id="creator-result" class="results-area"></div>
      </div>
    </div>
    <div class="panel-cta-bar" style="position:static;padding:0">
      <button class="panel-cta-btn" id="create-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        Create / Resize
      </button>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../../js/shell.js"></script>
  <script src="../../js/theme.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/format-utils.js"></script>
  <script src="../../js/image-tools.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
