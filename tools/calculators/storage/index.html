<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Storage Converter — KaruviLab</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <script>window.SHELL_ACTIVE = 'calculators';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">
      <div class="nav-head">
        <p class="nav-title">Data Storage Converter</p>
        <p class="nav-subtitle">Convert between Bytes, KB, MB, GB, and TB</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-section">
        <div class="fmt-grid">
          <div class="fmt-field">
            <label class="tool-label">Value</label>
            <input type="number" class="workspace-input" id="st-val" value="1" min="0">
          </div>
          <div class="fmt-field">
            <label class="tool-label">From</label>
            <select class="workspace-input" id="st-from">
              <option value="0">Bytes</option>
              <option value="1">KB (Kilobytes)</option>
              <option value="2">MB (Megabytes)</option>
              <option value="3" selected>GB (Gigabytes)</option>
              <option value="4">TB (Terabytes)</option>
            </select>
          </div>
          <div class="fmt-field">
            <label class="tool-label">To</label>
            <select class="workspace-input" id="st-to">
              <option value="0">Bytes</option>
              <option value="1">KB</option>
              <option value="2" selected>MB</option>
              <option value="3">GB</option>
              <option value="4">TB</option>
            </select>
          </div>
        </div>
        <div class="fmt-actions">
          <button class="fmt-btn fmt-btn-primary" id="calc-btn">Convert</button>
        </div>
        <div class="results-area" id="st-result" style="display:none; margin-top: 24px;"></div>
      </div>

      <div class="tool-section info-section">
        <h3>About Data Storage</h3>
        <p>This converter uses the binary standard (base 1024).</p>
        <p>Reference: 1 KB = 1,024 bytes · 1 MB = 1,024 KB · 1 GB = 1,024 MB · 1 TB = 1,024 GB.</p>
      </div>
    </div>
  </div>

  <script src="../../../js/shell.js"></script>
  <script src="../../../js/theme.js"></script>
  <script src="../../../js/utils.js"></script>
  <script>
    (function() {
      const el = id => document.getElementById(id);
      const fmt = (n, d = 2) => n.toLocaleString('en-IN', { minimumFractionDigits: d, maximumFractionDigits: d });
      const metric = (label, value, cls='') => `
        <div class="result-card" style="margin-bottom:12px">
          <div style="font-size:0.75rem; color:var(--text-3); text-transform:uppercase; font-weight:700;">${label}</div>
          <div style="font-size:1.5rem; font-weight:800; color:${cls==='accent'?'var(--blue)':'var(--text)'}">${value}</div>
        </div>`;

      el('calc-btn').onclick = () => {
        const val = +el('st-val').value;
        const from = +el('st-from').value;
        const to = +el('st-to').value;
        const units = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
        
        const bytes = val * Math.pow(1024, from);
        const out = bytes / Math.pow(1024, to);
        
        const res = el('st-result');
        res.innerHTML = `
          <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:12px;">
            ${metric('Converted', fmt(out, out < 0.01 ? 6 : 2) + ' ' + units[to], 'accent')}
            ${metric('In Bytes', fmt(bytes, 0))}
          </div>`;
        res.style.display = 'block';
      };
    })();
  </script>
</body>
</html>
