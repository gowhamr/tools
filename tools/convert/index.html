<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convert Image — KaruviLab</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <script>window.SHELL_ACTIVE = 'convert';</script>
</head>
<body>
  <div class="panel tool-panel active" id="panel-converter">
    <div class="panel-nav">

      <div class="nav-back" onclick="Shell.goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">Convert</p>
        <p class="nav-subtitle">Transform to any image format instantly</p>
      </div>
    </div>
    <div class="panel-scroll">

      <div class="panel-upload-group">
        <div class="upload-zone upload-zone-hero" id="converter-drop">
          <div class="upload-icon-wrap">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/>
              <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
          </div>
          <p class="upload-main">Upload Files</p>
          <p class="upload-sub"><label for="converter-input">Tap to select</label> or drag files here</p>
          <p class="upload-formats">JPG &middot; PNG &middot; GIF &middot; WebP &middot; AVIF &middot; TIFF &middot; BMP &middot; HEIC &middot; PDF</p>
          <input type="file" id="converter-input" accept=".jpg,.jpeg,.jfif,.png,.gif,.webp,.avif,.tiff,.tif,.bmp,.heic,.heif,.pdf" multiple />
        </div>
      </div>

      <div class="panel-settings-group">
        <div class="settings-card">
          <p class="settings-card-title">Output Settings</p>
          <div class="settings-row">
            <span class="settings-label">Convert to</span>
            <select id="convert-to-format">
              <optgroup label="Classic">
                <option value="jpg">JPG / JPEG</option>
                <option value="jfif">JFIF</option>
                <option value="png">PNG</option>
                <option value="gif">GIF</option>
                <option value="bmp">BMP</option>
                <option value="tiff">TIFF</option>
              </optgroup>
              <optgroup label="Modern">
                <option value="webp">WebP ✦</option>
                <option value="avif">AVIF ✦</option>
              </optgroup>
              <optgroup label="Document">
                <option value="pdf">PDF</option>
              </optgroup>
            </select>
          </div>
          <div class="slider-row">
            <div class="slider-header">
              <span class="slider-label">Quality</span>
              <span class="slider-val" id="convert-quality-val">85%</span>
            </div>
            <input type="range" id="convert-quality" min="0.1" max="1" step="0.05" value="0.85" />
          </div>
        </div>
        <p id="modern-fmt-note" class="fmt-note" style="display:none"></p>
        <div class="panel-cta-bar" style="position:static;padding:0">
          <button class="panel-cta-btn" id="convert-btn" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/>
              <path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/>
            </svg>
            Convert Now
          </button>
        </div>
      </div>

      <div class="panel-files-group">
        <div id="converter-file-list" class="file-list"></div>
        <div id="converter-results" class="results-area"></div>
      </div>

    </div>
  </div>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/utif@3.1.0/UTIF.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>

  <!-- Scripts -->
  <script src="../../js/shell.js"></script>
  <script src="../../js/theme.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/format-utils.js"></script>
  <script src="../../js/image-tools.js"></script>
  <script src="../../js/pdf-tools.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
