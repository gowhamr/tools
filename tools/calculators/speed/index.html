<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Converter — KaruviLab</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <script>window.SHELL_ACTIVE = 'calculators';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">

      <div class="nav-back" onclick="Shell.goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">Speed Converter</p>
        <p class="nav-subtitle">Convert between km/h, mph, m/s, and knots</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-section">
        <div class="fmt-grid">
          <div class="fmt-field">
            <label class="tool-label">km/h (Kilometers per hour)</label>
            <input type="number" class="workspace-input" id="sp-kmh" value="100" data-unit="kmh">
          </div>
          <div class="fmt-field">
            <label class="tool-label">mph (Miles per hour)</label>
            <input type="number" class="workspace-input" id="sp-mph" data-unit="mph">
          </div>
          <div class="fmt-field">
            <label class="tool-label">m/s (Meters per second)</label>
            <input type="number" class="workspace-input" id="sp-ms" data-unit="ms">
          </div>
          <div class="fmt-field">
            <label class="tool-label">knots (Nautical miles per hour)</label>
            <input type="number" class="workspace-input" id="sp-kn" data-unit="kn">
          </div>
        </div>
        <p style="margin-top:14px; font-size:0.82rem; color:var(--text-3);">Type in any field to convert live.</p>
      </div>

      <div class="tool-section info-section">
        <h3>About Speed Units</h3>
        <p>Reference: 100 km/h ≈ 62.14 mph ≈ 27.78 m/s ≈ 53.996 knots.</p>
      </div>
    </div>
  </div>

  <script src="../../../js/shell.js"></script>
  <script src="../../../js/theme.js"></script>
  <script src="../../../js/utils.js"></script>
  <script>
    (function() {
      const kmh = document.getElementById('sp-kmh'), mph = document.getElementById('sp-mph'), ms = document.getElementById('sp-ms'), kn = document.getElementById('sp-kn');
      const sync = (src) => {
        const v = parseFloat(src.value);
        if (isNaN(v)) return;
        let mps;
        if (src.dataset.unit === 'kmh') mps = v / 3.6;
        else if (src.dataset.unit === 'mph') mps = v * 0.44704;
        else if (src.dataset.unit === 'ms') mps = v;
        else mps = v * 0.514444;
        
        if (src !== kmh) kmh.value = (Math.round(mps * 3.6 * 100) / 100);
        if (src !== mph) mph.value = (Math.round(mps / 0.44704 * 100) / 100);
        if (src !== ms) ms.value = (Math.round(mps * 100) / 100);
        if (src !== kn) kn.value = (Math.round(mps / 0.514444 * 100) / 100);
      };
      [kmh, mph, ms, kn].forEach(x => x.addEventListener('input', () => sync(x)));
      sync(kmh);
    })();
  </script>
</body>
</html>
