<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator — KaruviLab</title>
  <link rel="stylesheet" href="../../css/style.css">
  <script>window.SHELL_ACTIVE = 'qrcode';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">

      <div class="nav-back" onclick="Shell.goHome()" role="button" tabindex="0" aria-label="Go home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">QR Code Generator</p>
        <p class="nav-subtitle">Generate QR codes instantly</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="settings-card">
        <p class="settings-card-title">Content</p>
        <div class="qr-input-group">
          <textarea class="tool-textarea" id="qr-input" rows="3"
            placeholder="Enter URL, text, phone number, email…"
            spellcheck="false"></textarea>
        </div>
        <div class="qr-preset-row">
          <button class="qr-preset-chip" data-qr-prefix="https://">URL</button>
          <button class="qr-preset-chip" data-qr-prefix="mailto:">Email</button>
          <button class="qr-preset-chip" data-qr-prefix="tel:">Phone</button>
          <button class="qr-preset-chip" data-qr-prefix="sms:">SMS</button>
          <button class="qr-preset-chip" data-qr-prefix="WIFI:T:WPA;S:;P:;;">Wi-Fi</button>
        </div>
      </div>

      <div class="settings-card">
        <p class="settings-card-title">Options</p>
        <div class="settings-row">
          <span class="settings-label">Size</span>
          <select id="qr-size">
            <option value="128">128 × 128</option>
            <option value="256" selected>256 × 256</option>
            <option value="512">512 × 512</option>
          </select>
        </div>
        <div class="settings-row">
          <span class="settings-label">Error correction</span>
          <select id="qr-ecl">
            <option value="L">Low (L)</option>
            <option value="M" selected>Medium (M)</option>
            <option value="Q">Quartile (Q)</option>
            <option value="H">High (H)</option>
          </select>
        </div>
        <div class="settings-row">
          <span class="settings-label">Foreground</span>
          <input type="color" id="qr-fg-color" value="#000000" class="qr-color-input" />
        </div>
        <div class="settings-row" style="border-bottom:none">
          <span class="settings-label">Background</span>
          <input type="color" id="qr-bg-color" value="#ffffff" class="qr-color-input" />
        </div>
      </div>

      <button class="panel-cta-btn" id="qr-gen-btn" style="width:100%;margin-bottom:14px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/><path d="M14 14h2v2h-2zM18 14h3M14 18h2M18 18h3M21 21h-3v-3"/></svg>
        Generate QR Code
      </button>

      <div class="qr-preview-card" id="qr-preview-card">
        <div class="qr-canvas-wrap">
          <canvas id="qr-canvas" width="256" height="256"></canvas>
          <div class="qr-empty-hint" id="qr-empty-hint">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="5" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="16" y="5" width="3" height="3" fill="currentColor" stroke="none"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="5" y="16" width="3" height="3" fill="currentColor" stroke="none"/><path d="M14 14h2v2h-2zM18 14h3M14 18h2M18 18h3M21 21h-3v-3"/></svg>
            <p>Enter content above to generate</p>
          </div>
        </div>
        <p class="qr-caption" id="qr-caption"></p>
      </div>

      <div class="panel-cta-bar" style="position:static;padding:0;margin-top:12px">
        <button class="panel-cta-btn" id="qr-download-btn" disabled onclick="qrDownload('png')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download PNG
        </button>
        <button class="fmt-btn" id="qr-copy-btn" disabled onclick="qrCopyImage()" style="margin-left:8px">Copy Image</button>
        <button class="fmt-btn" id="qr-svg-btn" disabled onclick="qrDownload('svg')" style="margin-left:8px">SVG</button>
      </div>
    </div>
  </div>
  <script src="../../js/lib/qrcode.min.js"></script>
  <script src="../../js/shell.js"></script>
  <script src="../../js/theme.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/qrcode-tool.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
