<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter — KaruviLab</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <script>window.SHELL_ACTIVE = 'calculators';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">

      <div class="nav-back" onclick="Shell.goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">Temperature Converter</p>
        <p class="nav-subtitle">Convert between Celsius, Fahrenheit, and Kelvin</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-section">
        <div class="fmt-grid">
          <div class="fmt-field">
            <label class="tool-label">Celsius (°C)</label>
            <input type="number" class="workspace-input" id="temp-c" value="25" data-unit="c">
          </div>
          <div class="fmt-field">
            <label class="tool-label">Fahrenheit (°F)</label>
            <input type="number" class="workspace-input" id="temp-f" data-unit="f">
          </div>
          <div class="fmt-field">
            <label class="tool-label">Kelvin (K)</label>
            <input type="number" class="workspace-input" id="temp-k" data-unit="k">
          </div>
        </div>
        <p style="margin-top:14px; font-size:0.82rem; color:var(--text-3);">Type in any field to convert live.</p>
      </div>

      <div class="tool-section info-section">
        <h3>About Temperature Scales</h3>
        <ul>
          <li>0°C = 32°F = 273.15 K (water freezes)</li>
          <li>100°C = 212°F = 373.15 K (water boils)</li>
        </ul>
      </div>
    </div>
  </div>

  <script src="../../../js/shell.js"></script>
  <script src="../../../js/theme.js"></script>
  <script src="../../../js/utils.js"></script>
  <script>
    (function() {
      const c = document.getElementById('temp-c'), f = document.getElementById('temp-f'), k = document.getElementById('temp-k');
      const sync = (src) => {
        const v = parseFloat(src.value);
        if (isNaN(v)) return;
        let celsius;
        if (src.dataset.unit === 'c') celsius = v;
        else if (src.dataset.unit === 'f') celsius = (v - 32) * 5 / 9;
        else celsius = v - 273.15;
        
        if (src !== c) c.value = (Math.round(celsius * 100) / 100);
        if (src !== f) f.value = (Math.round((celsius * 9 / 5 + 32) * 100) / 100);
        if (src !== k) k.value = (Math.round((celsius + 273.15) * 100) / 100);
      };
      [c, f, k].forEach(x => x.addEventListener('input', () => sync(x)));
      sync(c);
    })();
  </script>
</body>
</html>
