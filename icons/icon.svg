<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="#1E3A8A"/>
  <rect width="192" height="192" rx="38" fill="url(#bg-grad)"/>
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Flask body -->
  <path d="M76 42 L76 95 L42 154 Q37 165 50 169 L142 169 Q155 165 150 154 L116 95 L116 42 Z"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Flask liquid fill -->
  <path d="M55 120 L42 154 Q37 165 50 169 L142 169 Q155 165 150 154 L137 120 Z"
        fill="rgba(147,197,253,0.35)"/>
  <path d="M48 140 L42 154 Q37 165 50 169 L142 169 Q155 165 150 154 L144 140 Z"
        fill="rgba(191,219,254,0.3)"/>

  <!-- Bubbles -->
  <circle cx="82" cy="145" r="5.5" fill="rgba(255,255,255,0.55)"/>
  <circle cx="106" cy="155" r="4"   fill="rgba(255,255,255,0.4)"/>
  <circle cx="95"  cy="136" r="3"   fill="rgba(255,255,255,0.45)"/>

  <!-- Flask neck cap -->
  <rect x="68" y="32" width="56" height="14" rx="7" fill="rgba(255,255,255,0.92)"/>

  <!-- K letterform -->
  <text x="96" y="97"
        font-family="Poppins, Arial Black, sans-serif"
        font-weight="800"
        font-size="44"
        fill="white"
        text-anchor="middle"
        dominant-baseline="middle"
        opacity="0.95">K</text>
</svg>
