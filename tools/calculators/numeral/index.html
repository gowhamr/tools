<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Numeral Converter — KaruviLab</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <script>window.SHELL_ACTIVE = 'calculators';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">

      <div class="nav-back" onclick="Shell.goHome()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">Numeral Converter</p>
        <p class="nav-subtitle">Convert between Binary, Octal, Decimal, and Hex</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-section">
        <div class="fmt-grid">
          <div class="fmt-field">
            <label class="tool-label">Decimal (Base 10)</label>
            <input type="text" class="workspace-input" id="num-dec" value="255" data-base="10">
          </div>
          <div class="fmt-field">
            <label class="tool-label">Binary (Base 2)</label>
            <input type="text" class="workspace-input" id="num-bin" data-base="2">
          </div>
          <div class="fmt-field">
            <label class="tool-label">Octal (Base 8)</label>
            <input type="text" class="workspace-input" id="num-oct" data-base="8">
          </div>
          <div class="fmt-field">
            <label class="tool-label">Hexadecimal (Base 16)</label>
            <input type="text" class="workspace-input" id="num-hex" data-base="16">
          </div>
        </div>
        <p style="margin-top:14px; font-size:0.82rem; color:var(--text-3);">Type in any field — the others update live.</p>
      </div>

      <div class="tool-section info-section">
        <h3>About Numeral Systems</h3>
        <p>Convert numbers between different bases. Essential for programmers and computer science students.</p>
      </div>
    </div>
  </div>

  <script src="../../../js/shell.js"></script>
  <script src="../../../js/theme.js"></script>
  <script src="../../../js/utils.js"></script>
  <script>
    (function() {
      const el = id => document.getElementById(id);
      const fields = [el('num-dec'), el('num-bin'), el('num-oct'), el('num-hex')];

      const sync = (src) => {
        const base = +src.dataset.base;
        let v = src.value.trim();
        if (!v) { fields.forEach(f => { if (f !== src) f.value = ''; }); return; }
        
        const n = parseInt(v, base);
        if (isNaN(n)) return;
        
        fields.forEach(f => {
          if (f === src) return;
          const fb = +f.dataset.base;
          f.value = n.toString(fb).toUpperCase();
        });
      };

      fields.forEach(f => f.addEventListener('input', () => sync(f)));
      sync(fields[0]);
    })();
  </script>
</body>
</html>
