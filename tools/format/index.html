<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON & XML Formatter — KaruviLab</title>
  <meta name="description" content="Beautify and minify JSON or XML code for better readability.">
  <link rel="stylesheet" href="../../css/style.css">
  <script>(function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)})();</script>
  <script>window.SHELL_ACTIVE = 'format';</script>
</head>
<body>
  <div class="tool-page panel tool-panel active">
    <div class="panel-nav">

      <div class="nav-back" onclick="Shell.goHome()" role="button" tabindex="0" aria-label="Go home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">JSON / XML Formatter</p>
        <p class="nav-subtitle">Beautify &amp; minify instantly</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-tabs" id="fmt-tabs">
        <button class="tool-tab active" data-tab="json">JSON</button>
        <button class="tool-tab" data-tab="xml">XML</button>
      </div>
      <div class="tool-section">
        <label class="tool-label">Input</label>
        <textarea class="tool-textarea" id="fmt-input" placeholder="Paste JSON or XML here…" rows="8" spellcheck="false"></textarea>
      </div>
      <div class="fmt-actions">
        <button class="fmt-btn fmt-btn-primary" id="fmt-beautify">✨ Beautify</button>
        <button class="fmt-btn" id="fmt-minify">Minify</button>
        <button class="fmt-btn" id="fmt-clear">Clear</button>
      </div>
      <div class="tool-output-wrap" id="fmt-output-wrap" hidden>
        <div class="tool-output-header">
          <span class="tool-output-label">Output</span>
          <button class="tool-copy-btn" id="fmt-copy">Copy</button>
        </div>
        <pre class="fmt-pre" id="fmt-output"></pre>
      </div>
      <p class="tool-error" id="fmt-error" hidden></p>
    </div>
  </div>
  <script src="../../js/shell.js"></script>
  <script src="../../js/theme.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/format-utils.js"></script>
  <script src="../../js/app.js"></script>
</body>
</html>
