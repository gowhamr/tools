<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diff Checker — KaruviLab</title>
  <link rel="stylesheet" href="../../css/style.css" />
  <style>
    .diff-container {
      display: flex;
      gap: 1px;
      background: var(--border);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      margin-top: 16px;
    }
    .diff-box {
      flex: 1;
      background: var(--surface);
      overflow-x: auto;
      min-height: 200px;
    }
    .diff-header {
      padding: 6px 12px;
      background: var(--bg);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-3);
      border-bottom: 1px solid var(--border-2);
    }
    .diff-content {
      padding: 10px 0;
    }
    .diff-line {
      padding: 0 12px;
      white-space: pre;
      min-height: 1.6em;
      line-height: 1.6;
    }
    .diff-added { background: #ecfdf5; color: #065f46; }
    .diff-removed { background: #fef2f2; color: #991b1b; }
    .diff-line-num {
      display: inline-block;
      width: 30px;
      color: var(--text-4);
      user-select: none;
      text-align: right;
      margin-right: 12px;
      border-right: 1px solid var(--border-2);
      padding-right: 8px;
    }
  </style>
  <script>window.SHELL_ACTIVE = 'tools';</script>
</head>
<body class="app-shell">
  <noscript>
    <div style="padding: 20px; text-align: center; background: #fee2e2; color: #991b1b;">
      Please enable JavaScript to use KaruviLab tools.
    </div>
  </noscript>

  <div class="panel tool-panel active">
    <div class="panel-nav">
      <div class="nav-back" onclick="Shell.goHome()" role="button" tabindex="0" aria-label="Go home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="nav-head">
        <p class="nav-title">Diff Checker</p>
        <p class="nav-subtitle">Compare two text snippets side-by-side</p>
      </div>
    </div>
    <div class="panel-scroll">
      <nav class="breadcrumb-nav"><a href="../../">Home</a> <span class="breadcrumb-sep">/</span> <a href="../">Tools</a> <span class="breadcrumb-sep">/</span> <span class="current">Diff Checker</span></nav>

      <div class="two-col" style="gap:16px">
        <div class="tool-section">
          <label class="tool-label">Original Text</label>
          <textarea class="tool-textarea" id="text-old" rows="10" placeholder="Paste original text here..." spellcheck="false"></textarea>
        </div>
        <div class="tool-section">
          <label class="tool-label">Changed Text</label>
          <textarea class="tool-textarea" id="text-new" rows="10" placeholder="Paste changed text here..." spellcheck="false"></textarea>
        </div>
      </div>

      <div id="diff-result-wrap" hidden>
        <div class="tool-label" style="margin-top:20px">Comparison Result</div>
        <div class="diff-container">
          <div class="diff-box">
            <div class="diff-header">Original</div>
            <div class="diff-content" id="diff-old"></div>
          </div>
          <div class="diff-box">
            <div class="diff-header">Changed</div>
            <div class="diff-content" id="diff-new"></div>
          </div>
        </div>
      </div>

      <div class="settings-card" style="margin-top:20px">
        <p class="settings-card-title">Options</p>
        <div class="settings-row">
          <span class="settings-label">Live Preview</span>
          <label class="checkbox-label" style="padding-top:0"><input type="checkbox" id="live-mode" checked> Enabled</label>
        </div>
      </div>
      
      <button class="panel-cta-btn" id="run-btn" style="margin-top:20px">✓ Compare Texts</button>
    </div>
  </div>

  <script src="../../js/shell.js"></script>
  <script src="../../js/theme.js"></script>
  <script src="../../js/utils.js"></script>
  <script src="../../js/app.js"></script>

  <script>
    (function() {
      const oldInput = document.getElementById('text-old');
      const newInput = document.getElementById('text-new');
      const diffOld = document.getElementById('diff-old');
      const diffNew = document.getElementById('diff-new');
      const resultWrap = document.getElementById('diff-result-wrap');
      const runBtn = document.getElementById('run-btn');
      const liveMode = document.getElementById('live-mode');

      function compare() {
        const oldVal = oldInput.value;
        const newVal = newInput.value;
        
        if (!oldVal && !newVal) {
          resultWrap.hidden = true;
          return;
        }

        const oldLines = oldVal.split('\n');
        const newLines = newVal.split('\n');
        const maxLines = Math.max(oldLines.length, newLines.length);
        
        let oldHtml = '';
        let newHtml = '';
        
        for (let i = 0; i < maxLines; i++) {
          const oldLine = oldLines[i] !== undefined ? oldLines[i] : '';
          const newLine = newLines[i] !== undefined ? newLines[i] : '';
          
          const lineNum = i + 1;
          const lineNumHtml = `<span class="diff-line-num">${lineNum}</span>`;

          if (oldLine === newLine) {
            oldHtml += `<div class="diff-line">${lineNumHtml}${Utils.escHtml(oldLine)}</div>`;
            newHtml += `<div class="diff-line">${lineNumHtml}${Utils.escHtml(newLine)}</div>`;
          } else {
            if (oldLines[i] !== undefined && newLines[i] !== undefined) {
               oldHtml += `<div class="diff-line diff-removed">${lineNumHtml}${Utils.escHtml(oldLine)}</div>`;
               newHtml += `<div class="diff-line diff-added">${lineNumHtml}${Utils.escHtml(newLine)}</div>`;
            } else if (oldLines[i] !== undefined) {
               oldHtml += `<div class="diff-line diff-removed">${lineNumHtml}${Utils.escHtml(oldLine)}</div>`;
               newHtml += `<div class="diff-line">${lineNumHtml} </div>`;
            } else {
               oldHtml += `<div class="diff-line">${lineNumHtml} </div>`;
               newHtml += `<div class="diff-line diff-added">${lineNumHtml}${Utils.escHtml(newLine)}</div>`;
            }
          }
        }

        diffOld.innerHTML = oldHtml;
        diffNew.innerHTML = newHtml;
        resultWrap.hidden = false;
      }

      const debouncedCompare = Utils.debounce(compare, 500);

      oldInput.oninput = () => { if (liveMode.checked) debouncedCompare(); };
      newInput.oninput = () => { if (liveMode.checked) debouncedCompare(); };
      runBtn.onclick = compare;
    })();
  </script>
</body>
</html>
