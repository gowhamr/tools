<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTC ↔ IST Converter — KaruviLab</title>
  <link rel="stylesheet" href="../../../css/style.css">
  <script>window.SHELL_ACTIVE = 'calculators';</script>
</head>
<body>
  <div class="panel tool-panel active">
    <div class="panel-nav">
      <div class="nav-head">
        <p class="nav-title">UTC ↔ IST Converter</p>
        <p class="nav-subtitle">Instant conversion between UTC and IST (+5:30)</p>
      </div>
    </div>
    <div class="panel-scroll">
      <div class="tool-section">
        <div class="fmt-grid">
          <div class="fmt-field">
            <label class="tool-label">Direction</label>
            <select class="workspace-input" id="utcist-dir">
              <option value="utc2ist">UTC → IST</option>
              <option value="ist2utc">IST → UTC</option>
            </select>
          </div>
          <div class="fmt-field">
            <label class="tool-label">Date</label>
            <input type="date" class="workspace-input" id="utcist-date">
          </div>
          <div class="fmt-field">
            <label class="tool-label">Time (24h)</label>
            <input type="time" class="workspace-input" id="utcist-time" value="12:00">
          </div>
        </div>
        <div class="fmt-actions">
          <button class="fmt-btn fmt-btn-primary" id="calc-btn">Convert</button>
        </div>
        <div class="results-area" id="utcist-result" style="display:none; margin-top: 24px;"></div>
      </div>

      <div class="tool-section info-section">
        <h3>About UTC ↔ IST</h3>
        <p>Indian Standard Time (IST) is UTC+5:30. India does not observe daylight saving time, so the offset is constant year-round.</p>
      </div>
    </div>
  </div>

  <script src="../../../js/shell.js"></script>
  <script src="../../../js/theme.js"></script>
  <script src="../../../js/utils.js"></script>
  <script>
    (function() {
      const el = id => document.getElementById(id);
      const res = el('utcist-result');
      
      const today = new Date().toISOString().split('T')[0];
      el('utcist-date').value = today;

      el('calc-btn').onclick = () => {
        const dir = el('utcist-dir').value;
        const dateV = el('utcist-date').value;
        const timeV = el('utcist-time').value;
        if (!dateV || !timeV) return;
        
        const [y, mo, d] = dateV.split('-').map(Number);
        const [hh, mm] = timeV.split(':').map(Number);
        const IST_OFFSET = 5 * 60 + 30; // minutes
        
        let srcLabel, dstLabel, srcTime, dstMin;
        if (dir === 'utc2ist') {
          srcLabel = 'UTC'; dstLabel = 'IST (UTC+5:30)';
          const utc = new Date(Date.UTC(y, mo - 1, d, hh, mm));
          srcTime = utc;
          dstMin = utc.getTime() + IST_OFFSET * 60000;
        } else {
          srcLabel = 'IST (UTC+5:30)'; dstLabel = 'UTC';
          const ist = new Date(Date.UTC(y, mo - 1, d, hh, mm));
          srcTime = ist;
          dstMin = ist.getTime() - IST_OFFSET * 60000;
        }
        
        const dst = new Date(dstMin);
        const fmt = dt => {
          const h = String(dt.getUTCHours()).padStart(2,'0');
          const m = String(dt.getUTCMinutes()).padStart(2,'0');
          const dy = dt.getUTCDate();
          const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][dt.getUTCMonth()];
          const yr = dt.getUTCFullYear();
          return `${h}:${m} · ${dy} ${mon} ${yr}`;
        };

        res.innerHTML = `
          <div style="display:grid; gap:16px;">
            <div class="result-card">
              <div style="font-size:0.75rem; color:var(--text-3); text-transform:uppercase; font-weight:700; margin-bottom:8px;">${srcLabel}</div>
              <div style="font-size:1.4rem; font-weight:800; font-family:monospace;">${fmt(srcTime)}</div>
            </div>
            <div style="text-align:center; font-size:1.5rem; color:var(--text-3);">↓</div>
            <div class="result-card" style="border-color:var(--blue); background:var(--blue-light);">
              <div style="font-size:0.75rem; color:var(--blue); text-transform:uppercase; font-weight:700; margin-bottom:8px;">${dstLabel}</div>
              <div style="font-size:1.4rem; font-weight:800; font-family:monospace; color:var(--blue);">${fmt(dst)}</div>
            </div>
          </div>`;
        res.style.display = 'block';
      };
    })();
  </script>
</body>
</html>
